[mcp_servers.bevy-brp]
command = "./scripts/bevy_brp_mcp"
startup_timeout_sec = 120
tool_timeout_sec = 30

[mcp_servers.bevy-brp.tools.world_trigger_event]
approval_mode = "approve"

[mcp_servers.bevy-brp.tools.brp_extras_screenshot]
approval_mode = "approve"

[mcp_servers.bevy-brp.tools.brp_execute]
approval_mode = "approve"

[mcp_servers.bevy-brp.tools.brp_shutdown]
approval_mode = "approve"

[mcp_servers.bevy-brp.tools.world_insert_components]
approval_mode = "approve"

[mcp_servers.bevy-brp.tools.world_mutate_components]
approval_mode = "approve"

[mcp_servers.bevy-brp.tools.world_mutate_resources]
approval_mode = "approve"
